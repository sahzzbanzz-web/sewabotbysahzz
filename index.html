<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SEWA BOT WhatsApp – SAHZZ</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #111118;
            --bg-card: #16161f;
            --bg-card-hover: #1c1c28;
            --border: #2a2a3a;
            --green: #25D366;
            --green-dark: #1da851;
            --green-dim: rgba(37, 211, 102, 0.15);
            --green-glow: rgba(37, 211, 102, 0.3);
            --text-primary: #e8e8ef;
            --text-secondary: #8888a0;
            --text-dim: #55556a;
            --red: #ff4757;
            --yellow: #ffa502;
            --blue: #3742fa;
            --cyan: #00d2d3;
            --purple: #a55eea;
            --orange: #ff6348;
            --tg-blue: #2AABEE;
            --tg-dim: rgba(42,171,238,0.12);
            --tg-glow: rgba(42,171,238,0.3);
            --wa-bg: #0b141a;
            --wa-bubble-out: #005c4b;
            --wa-bubble-in: #1f2c34;
            --wa-header: #1f2c34;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                linear-gradient(rgba(37,211,102,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(37,211,102,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(
                0deg, transparent, transparent 2px,
                rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px
            );
            pointer-events: none;
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 480px;
            margin: 0 auto;
            padding: 0 16px 100px;
        }

        .top-bar {
            position: sticky;
            top: 0;
            z-index: 30;
            background: rgba(10,10,15,0.92);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .top-bar-text { font-size: 12px; font-weight: 500; color: var(--text-secondary); letter-spacing: 0.3px; }
        .top-bar-text strong { color: var(--text-primary); font-weight: 600; }
        .top-bar-text .dash { color: var(--text-dim); margin: 0 2px; }

        .header { text-align: center; padding: 32px 0 12px; }

        .header-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--green-dim);
            border: 1px solid rgba(37,211,102,0.25);
            border-radius: 20px;
            padding: 5px 14px;
            font-size: 11px;
            font-weight: 600;
            color: var(--green);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 18px;
            animation: badgePulse 2s ease-in-out infinite;
        }

        @keyframes badgePulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(37,211,102,0.2); }
            50% { box-shadow: 0 0 15px 2px rgba(37,211,102,0.15); }
        }

        .header-badge .dot {
            width: 6px; height: 6px;
            background: var(--green);
            border-radius: 50%;
            animation: blink 1.2s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .header h1 {
            font-size: 40px;
            font-weight: 800;
            letter-spacing: -1px;
            line-height: 1;
            color: #fff;
            margin-bottom: 10px;
            text-shadow: 0 0 40px rgba(37,211,102,0.15);
        }

        .header h1 .by {
            display: block;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-top: 6px;
            text-shadow: none;
        }

        .header h1 .by span { color: var(--green); font-weight: 700; }

        .header .subtitle {
            font-size: 11px;
            color: var(--text-secondary);
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 400;
        }

        .header .subtitle span { color: var(--green); font-weight: 600; }

        .link-detector {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 16px;
            margin: 16px 0;
            position: relative;
            overflow: hidden;
        }

        .link-detector::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--red), transparent);
            animation: scanLine 3s linear infinite;
        }

        @keyframes scanLine {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .ld-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .ld-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .ld-title i { color: var(--red); font-size: 14px; }

        .ld-status {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 10px;
            font-weight: 600;
            color: var(--green);
            background: var(--green-dim);
            padding: 3px 10px;
            border-radius: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .ld-status .dot {
            width: 5px; height: 5px;
            background: var(--green);
            border-radius: 50%;
            animation: blink 1s infinite;
        }

        .ld-items { display: flex; flex-direction: column; gap: 6px; }

        .ld-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--text-secondary);
            padding: 6px 10px;
            background: rgba(255,71,87,0.05);
            border: 1px solid rgba(255,71,87,0.1);
            border-radius: 6px;
        }

        .ld-item i { color: var(--red); font-size: 10px; }

        .ld-item .blocked {
            color: var(--red);
            font-weight: 600;
            margin-left: auto;
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin: 16px 0;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 10px;
            text-align: center;
            transition: all 0.3s;
        }

        .stat-card:hover {
            border-color: rgba(37,211,102,0.3);
            background: var(--bg-card-hover);
            transform: translateY(-2px);
        }

        .stat-value { font-size: 20px; font-weight: 700; color: #fff; line-height: 1; }
        .stat-value .trend { font-size: 11px; color: var(--green); font-weight: 500; }
        .stat-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; }

        .uptime-bar {
            width: 100%; height: 4px;
            background: var(--bg-secondary);
            border-radius: 2px;
            margin-top: 6px;
            overflow: hidden;
        }

        .uptime-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--green-dark), var(--green));
            border-radius: 2px;
            width: 0%;
            animation: fillBar 2s ease-out 0.5s forwards;
        }

        @keyframes fillBar { to { width: 99%; } }

        .sys-log {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 16px;
            margin: 16px 0;
            font-family: 'JetBrains Mono', monospace;
        }

        .sys-log-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .sys-log-title i { color: var(--green); font-size: 12px; }

        .log-entries {
            display: flex;
            flex-direction: column;
            gap: 5px;
            max-height: 160px;
            overflow: hidden;
            position: relative;
        }

        .log-entries::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 40px;
            background: linear-gradient(transparent, var(--bg-card));
            pointer-events: none;
        }

        .log-entry {
            font-size: 10.5px;
            line-height: 1.5;
            color: var(--text-secondary);
            display: flex;
            gap: 6px;
            animation: fadeInLog 0.4s ease-out both;
        }

        .log-entry:nth-child(1) { animation-delay: 0.1s; }
        .log-entry:nth-child(2) { animation-delay: 0.3s; }
        .log-entry:nth-child(3) { animation-delay: 0.5s; }
        .log-entry:nth-child(4) { animation-delay: 0.7s; }
        .log-entry:nth-child(5) { animation-delay: 0.9s; }
        .log-entry:nth-child(6) { animation-delay: 1.1s; }
        .log-entry:nth-child(7) { animation-delay: 1.3s; }

        @keyframes fadeInLog {
            from { opacity: 0; transform: translateX(-8px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .log-time { color: var(--text-dim); white-space: nowrap; }
        .log-tag { font-weight: 600; white-space: nowrap; }
        .log-tag.win { color: var(--green); }
        .log-tag.dl { color: var(--blue); }
        .log-tag.kick { color: var(--red); }
        .log-tag.flood { color: var(--yellow); }
        .log-tag.ok { color: var(--green); }

        .log-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px solid var(--border);
        }

        .log-footer-text { font-size: 12px; color: var(--text-primary); font-weight: 600; }
        .log-footer-text span { color: var(--green); }
        .log-footer-error { font-size: 10px; color: var(--green); font-weight: 500; }

        .section-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 14px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .section-title::before,
        .section-title::after {
            content: '';
            width: 30px;
            height: 1px;
            background: var(--border);
        }

        .pricing-section { margin: 20px 0; }
        .pricing-cards { display: flex; flex-direction: column; gap: 8px; }

        .price-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .price-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 3px; height: 100%;
            background: var(--text-dim);
            transition: all 0.3s;
        }

        .price-card:hover {
            border-color: rgba(37,211,102,0.3);
            background: var(--bg-card-hover);
            transform: translateX(4px);
        }

        .price-card:hover::before {
            background: var(--green);
            box-shadow: 0 0 10px var(--green-glow);
        }

        .price-card.premium {
            border-color: rgba(37,211,102,0.2);
            background: linear-gradient(135deg, rgba(37,211,102,0.05), var(--bg-card));
        }

        .price-card.premium::before {
            background: var(--green);
            box-shadow: 0 0 10px var(--green-glow);
        }

        .price-card.premium .price-badge {
            background: var(--green);
            color: var(--bg-primary);
        }

        .pc-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 4px;
        }

        .pc-left { display: flex; align-items: center; gap: 10px; }

        .price-badge {
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 3px 8px;
            border-radius: 4px;
            background: var(--bg-secondary);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .price-amount { font-size: 22px; font-weight: 700; color: #fff; }
        .price-amount small { font-size: 12px; font-weight: 400; color: var(--text-secondary); }

        .pc-duration {
            font-size: 11px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .pc-features {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid rgba(255,255,255,0.04);
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }

        .pc-feature {
            font-size: 10px;
            color: var(--text-dim);
            background: rgba(255,255,255,0.03);
            padding: 3px 8px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .pc-feature i { font-size: 8px; color: var(--green); }

        .price-card .arrow {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            font-size: 12px;
            transition: all 0.3s;
        }

        .price-card:hover .arrow {
            color: var(--green);
            transform: translateY(-50%) translateX(3px);
        }

        .livechat-section { margin: 24px 0; }

        .live-badge-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .live-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 10px;
            font-weight: 700;
            color: var(--red);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .live-indicator .live-dot {
            width: 7px; height: 7px;
            background: var(--red);
            border-radius: 50%;
            animation: livePulse 1s ease-in-out infinite;
        }

        @keyframes livePulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255,71,87,0.6); }
            50% { box-shadow: 0 0 0 5px rgba(255,71,87,0); }
        }

        .live-viewers {
            font-size: 10px;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .live-viewers i { font-size: 10px; }

        .livechat-wrapper {
            background: var(--wa-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
        }

        .lc-header {
            background: var(--wa-header);
            padding: 12px 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .lc-avatar {
            width: 38px; height: 38px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--green-dark), var(--green));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: #fff;
            flex-shrink: 0;
            position: relative;
        }

        .lc-avatar .online-dot {
            position: absolute;
            bottom: 0; right: 0;
            width: 10px; height: 10px;
            background: var(--green);
            border-radius: 50%;
            border: 2px solid var(--wa-header);
            animation: blink 1.5s infinite;
        }

        .lc-info { flex: 1; }
        .lc-name { font-size: 14px; font-weight: 600; color: #e9edef; }

        .lc-status-text {
            font-size: 11px;
            color: var(--green);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .lc-status-text .typing-dots {
            display: inline-flex;
            gap: 2px;
            align-items: center;
        }

        .lc-status-text .typing-dots span {
            width: 4px; height: 4px;
            background: var(--green);
            border-radius: 50%;
            animation: typingBounce 1.4s infinite;
        }

        .lc-status-text .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .lc-status-text .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-4px); opacity: 1; }
        }

        .lc-actions { display: flex; gap: 16px; }
        .lc-actions i { font-size: 16px; color: #aebac1; cursor: pointer; transition: color 0.2s; }
        .lc-actions i:hover { color: var(--green); }

        .lc-body {
            padding: 14px;
            min-height: 280px;
            max-height: 340px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
            background-image:
                radial-gradient(circle at 20% 30%, rgba(37,211,102,0.02) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(37,211,102,0.015) 0%, transparent 50%);
        }

        .lc-body::-webkit-scroll
